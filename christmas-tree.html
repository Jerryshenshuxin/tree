<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光效圣诞树</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            z-index: 100;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }
        p {
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>✨ 光效圣诞树 ✨</h1>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 场景设置
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        // 添加雾效
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);

        // 相机设置
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 0, 12);

        // 渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 轨道控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 5;
        controls.maxDistance = 30;
        controls.maxPolarAngle = Math.PI / 2 + 0.3;

        // 加载照片纹理
        const textureLoader = new THREE.TextureLoader();
        const photoTexture = textureLoader.load('1.png', (texture) => {
            console.log('照片纹理加载成功', texture);
        }, undefined, (error) => {
            console.error('照片纹理加载失败', error);
        });
        photoTexture.colorSpace = THREE.SRGBColorSpace;
        photoTexture.flipY = false;

        // 创建圆形光点纹理
        function createCircleTexture() {
            const canvas = document.createElement('canvas');
            canvas.width = 64;
            canvas.height = 64;
            const ctx = canvas.getContext('2d');

            const gradient = ctx.createRadialGradient(32, 32, 0, 32, 32, 32);
            gradient.addColorStop(0, 'rgba(255, 255, 255, 1)');
            gradient.addColorStop(0.5, 'rgba(255, 255, 255, 0.8)');
            gradient.addColorStop(1, 'rgba(255, 255, 255, 0)');

            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 64, 64);

            const texture = new THREE.CanvasTexture(canvas);
            return texture;
        }

        const circleTexture = createCircleTexture();

        // 光效圣诞树组
        const lightTreeGroup = new THREE.Group();
        scene.add(lightTreeGroup);

        // 金黄色光点材质
        const goldenLightMaterial = new THREE.PointsMaterial({
            color: 0xffd700,
            size: 0.04,
            map: circleTexture,
            transparent: true,
            opacity: 1,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true,
            alphaTest: 0.1
        });

        const warmGoldenMaterial = new THREE.PointsMaterial({
            color: 0xffaa00,
            size: 0.03,
            map: circleTexture,
            transparent: true,
            opacity: 1,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true,
            alphaTest: 0.1
        });

        const brightGoldenMaterial = new THREE.PointsMaterial({
            color: 0xffee88,
            size: 0.06,
            map: circleTexture,
            transparent: true,
            opacity: 1,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true,
            alphaTest: 0.1
        });

        // 存储所有光点用于动画
        const treeParticles = [];
        const particleGroups = [];

        // 创建螺旋光带
        function createSpiralLightStrip(startY, endY, startRadius, endRadius, turns, density) {
            const points = [];
            const totalPoints = density;

            for (let i = 0; i < totalPoints; i++) {
                const t = i / totalPoints;
                const angle = t * turns * Math.PI * 2;
                const y = startY + t * (endY - startY);
                const radius = startRadius + t * (endRadius - startRadius);

                // 主螺旋
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                points.push(new THREE.Vector3(x, y, z));

                // 添加反向螺旋增加密度
                const angle2 = -angle + Math.PI;
                const x2 = Math.cos(angle2) * radius * 0.9;
                const z2 = Math.sin(angle2) * radius * 0.9;
                points.push(new THREE.Vector3(x2, y, z2));
            }

            return points;
        }

        // 创建圆形光环
        function createLightRing(y, radius, density, material) {
            const geometry = new THREE.BufferGeometry();
            const positions = [];

            for (let i = 0; i < density; i++) {
                const angle = (i / density) * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                positions.push(x, y, z);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const particles = new THREE.Points(geometry, material);
            lightTreeGroup.add(particles);
            particleGroups.push({ mesh: particles, baseY: y, type: 'ring' });

            return positions.length / 3;
        }

        // 创建树层光点（螺旋光带）
        function createTreeLayerLights(bottomY, topY, bottomRadius, topRadius, layerIndex) {
            const height = topY - bottomY;
            const turns = 3;
            const density = 1000;

            const positions = [];
            for (let i = 0; i < density; i++) {
                const t = i / density;
                const angle = t * turns * Math.PI * 2 + (layerIndex * Math.PI / 2);
                const y = bottomY + t * height;
                const radius = bottomRadius + t * (topRadius - bottomRadius);

                // 主螺旋
                let x = Math.cos(angle) * radius;
                let z = Math.sin(angle) * radius;
                positions.push(x, y, z);

                // 随机点缀光点
                if (i % 3 === 0) {
                    const randAngle = Math.random() * Math.PI * 2;
                    const randRadius = radius * (0.3 + Math.random() * 0.4);
                    x = Math.cos(randAngle) * randRadius;
                    z = Math.sin(randAngle) * randRadius;
                    positions.push(x, y + (Math.random() - 0.5) * 0.3, z);
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

            // 交替使用不同材质
            const material = layerIndex % 2 === 0 ? goldenLightMaterial : warmGoldenMaterial;
            const layerParticles = new THREE.Points(geometry, material);
            lightTreeGroup.add(layerParticles);
            particleGroups.push({ mesh: layerParticles, baseY: bottomY, type: 'layer' });

            return positions.length / 3;
        }

        // 创建轮廓光边（树边缘的亮线）
        function createOutlineLights() {
            const outlinePositions = [];
            const layers = [
                { y: 0, r: 1.8 },
                { y: 1.5, r: 1.5 },
                { y: 2.8, r: 1.0 },
                { y: 3.8, r: 0.5 }
            ];

            layers.forEach((layer, idx) => {
                // 每层底部轮廓
                for (let i = 0; i < 32; i++) {
                    const angle = (i / 32) * Math.PI * 2;
                    const x = Math.cos(angle) * layer.r;
                    const z = Math.sin(angle) * layer.r;
                    outlinePositions.push(x, layer.y - 0.3, z);
                }
            });

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(outlinePositions, 3));
            const outlineParticles = new THREE.Points(geometry, brightGoldenMaterial);
            lightTreeGroup.add(outlineParticles);
            particleGroups.push({ mesh: outlineParticles, type: 'outline' });

            return outlinePositions.length / 3;
        }

        // 创建顶部星星（由光点组成）
        function createStarLights() {
            const starPositions = [];
            const starY = 4.4;

            // 五角星顶点
            const outerRadius = 0.5;
            const innerRadius = 0.25;
            const points = 5;

            // 创建多层星星轮廓（竖直五角星，在 XY 平面）
            for (let layer = 0; layer < 3; layer++) {
                const layerScale = 1 - layer * 0.2;
                const layerX = layer * 0.1;

                for (let i = 0; i < points * 2; i++) {
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const baseAngle = (i * Math.PI) / points +  Math.PI;
                    const rotAngle = baseAngle;
                    const y = -Math.cos(rotAngle) * radius * layerScale;
                    const z = Math.sin(rotAngle) * radius * layerScale;
                    starPositions.push(layerX, starY + y, z);

                    // 每个点周围添加光晕
                    for (let j = 0; j < 3; j++) {
                        const haloAngle = Math.random() * Math.PI * 2;
                        const haloRadius = 0.05 + Math.random() * 0.1;
                        starPositions.push(
                            layerX + (Math.random() - 0.5) * 0.1,
                            starY + y + Math.cos(haloAngle) * haloRadius,
                            z + Math.sin(haloAngle) * haloRadius
                        );
                    }
                }
            }

            // 中心亮点
            for (let i = 0; i < 20; i++) {
                starPositions.push(
                    (Math.random() - 0.5) * 0.2,
                    starY + (Math.random() - 0.5) * 0.3,
                    (Math.random() - 0.5) * 0.2
                );
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
            const starParticles = new THREE.Points(geometry, brightGoldenMaterial);
            lightTreeGroup.add(starParticles);
            particleGroups.push({ mesh: starParticles, type: 'star' });

            // 星星点光源
            const starLight = new THREE.PointLight(0xffd700, 3, 15);
            starLight.position.set(0, starY, 0);
            scene.add(starLight);
            particleGroups.push({ light: starLight, type: 'starLight' });

            return starPositions.length / 3;
        }

        // 创建飘浮光粒子
        function createFloatingLights() {
            const floatPositions = [];
            const floatCount = 200;

            for (let i = 0; i < floatCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 3 + Math.random() * 5;
                const y = 1 + Math.random() * 8;
                floatPositions.push(
                    Math.cos(angle) * radius,
                    y,
                    Math.sin(angle) * radius
                );
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(floatPositions, 3));
            const floatMaterial = new THREE.PointsMaterial({
                color: 0xffaa00,
                size: 0.04,
                map: circleTexture,
                transparent: true,
                opacity: 0.4,
                blending: THREE.AdditiveBlending,
                depthWrite: false
            });
            const floatParticles = new THREE.Points(geometry, floatMaterial);
            scene.add(floatParticles);
            particleGroups.push({ mesh: floatParticles, type: 'floating' });
        }

        // 创建光效相框（围绕树）
        const photoFrames = [];

        function createLightPhotoFrame(x, y, z, rotY, scale = 1) {
            const frameGroup = new THREE.Group();

            // 照片 - 使用自定义几何体确保 UV 正确
            const photoGeometry = new THREE.BufferGeometry();
            const vertices = new Float32Array([
                -0.125, -0.1625, 0.05,   // 左下
                 0.125, -0.1625, 0.05,   // 右下
                 0.125,  0.1625, 0.05,   // 右上
                -0.125, -0.1625, 0.05,   // 左下
                 0.125,  0.1625, 0.05,   // 右上
                -0.125,  0.1625, 0.05    // 左上
            ]);
            const uvs = new Float32Array([
                0, 1,  // 左下
                1, 1,  // 右下
                1, 0,  // 右上
                0, 1,  // 左下
                1, 0,  // 右上
                0, 0   // 左上
            ]);
            photoGeometry.setAttribute('position', new THREE.BufferAttribute(vertices, 3));
            photoGeometry.setAttribute('uv', new THREE.BufferAttribute(uvs, 2));

            const photoMaterial = new THREE.MeshBasicMaterial({
                map: photoTexture,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0,
                depthTest: false
            });
            const photo = new THREE.Mesh(photoGeometry, photoMaterial);
            photo.rotation.y = Math.PI;
            photo.renderOrder = 999;
            photo.visible = false;
            frameGroup.add(photo);

            // 雪花形状（由小光点组成）- 精致树枝状冰晶结构
            const snowflakeMaterial = new THREE.PointsMaterial({
                color: 0x66ccff,
                size: 0.018,
                transparent: true,
                opacity: 0.9,
                blending: THREE.AdditiveBlending
            });

            const snowflakePositions = [];
            const arms = 6;

            // 创建雪花六角 - 树枝状冰晶
            for (let arm = 0; arm < arms; arm++) {
                const armAngle = (arm / arms) * Math.PI * 2;

                // 主枝干线 - 双线冰柱状
                for (let i = 0; i < 50; i++) {
                    const t = i / 50;
                    const dist = t * 0.24;

                    // 主干光点（双线，形成更明显的冰柱效果）
                    const offsetAngle = 0.025 * (1 - t * 0.7);
                    // 主线 1
                    snowflakePositions.push(
                        Math.cos(armAngle + offsetAngle) * dist,
                        Math.sin(armAngle + offsetAngle) * dist,
                        0.025
                    );
                    // 主线 2
                    snowflakePositions.push(
                        Math.cos(armAngle - offsetAngle) * dist,
                        Math.sin(armAngle - offsetAngle) * dist,
                        0.025
                    );

                    // 中心线增强
                    if (i % 3 === 0) {
                        snowflakePositions.push(
                            Math.cos(armAngle) * dist,
                            Math.sin(armAngle) * dist,
                            0.028
                        );
                    }

                    // 主枝两侧的冰晶分支（60 度角，像松树枝）
                    if (i >= 8 && i <= 42) {
                        const branchAngle1 = armAngle + Math.PI / 3;
                        const branchAngle2 = armAngle - Math.PI / 3;
                        // 中间粗两端细的分支
                        const branchFactor = Math.sin((t - 0.16) * Math.PI / 0.68) * 0.19;
                        const branchDist = Math.max(0, branchFactor);

                        // 分支双线结构
                        const branchOffset = 0.015 * (1 - t);
                        snowflakePositions.push(
                            Math.cos(branchAngle1 + branchOffset) * branchDist,
                            Math.sin(branchAngle1 + branchOffset) * branchDist,
                            0.022
                        );
                        snowflakePositions.push(
                            Math.cos(branchAngle1 - branchOffset) * branchDist,
                            Math.sin(branchAngle1 - branchOffset) * branchDist,
                            0.022
                        );
                        snowflakePositions.push(
                            Math.cos(branchAngle2 + branchOffset) * branchDist,
                            Math.sin(branchAngle2 + branchOffset) * branchDist,
                            0.022
                        );
                        snowflakePositions.push(
                            Math.cos(branchAngle2 - branchOffset) * branchDist,
                            Math.sin(branchAngle2 - branchOffset) * branchDist,
                            0.022
                        );

                        // 分支上的冰晶簇（3 层螺旋排列）
                        if (i % 4 === 0) {
                            for (let c = 0; c < 4; c++) {
                                const crystalT = c / 4;
                                const crystalDist = branchDist * (0.3 + crystalT * 0.7);
                                const spiralAngle = crystalT * Math.PI / 4;
                                const crystalAngle1 = branchAngle1 + Math.PI / 6 + spiralAngle;
                                const crystalAngle2 = branchAngle2 - Math.PI / 6 - spiralAngle;

                                snowflakePositions.push(
                                    Math.cos(crystalAngle1) * crystalDist,
                                    Math.sin(crystalAngle1) * crystalDist,
                                    0.02 + crystalT * 0.01
                                );
                                snowflakePositions.push(
                                    Math.cos(crystalAngle2) * crystalDist,
                                    Math.sin(crystalAngle2) * crystalDist,
                                    0.02 + crystalT * 0.01
                                );

                                // 二级小分支
                                if (c > 0) {
                                    const subBranchDist = crystalDist * 0.5;
                                    const subBranchAngle1 = crystalAngle1 + Math.PI / 8;
                                    const subBranchAngle2 = crystalAngle2 - Math.PI / 8;
                                    snowflakePositions.push(
                                        Math.cos(subBranchAngle1) * subBranchDist,
                                        Math.sin(subBranchAngle1) * subBranchDist,
                                        0.018
                                    );
                                    snowflakePositions.push(
                                        Math.cos(subBranchAngle2) * subBranchDist,
                                        Math.sin(subBranchAngle2) * subBranchDist,
                                        0.018
                                    );
                                }
                            }
                        }

                        // 分支末端的小冰晶簇
                        if (i % 6 === 0 && branchDist > 0.04) {
                            const tipAngle1 = branchAngle1 + Math.PI / 10;
                            const tipAngle2 = branchAngle1 - Math.PI / 10;
                            const tipAngle3 = branchAngle2 + Math.PI / 10;
                            const tipAngle4 = branchAngle2 - Math.PI / 10;
                            const tipDist = branchDist * 0.6;

                            // 三叉小冰晶
                            for (let f = 0; f < 3; f++) {
                                const forkAngle = f * Math.PI / 12;
                                snowflakePositions.push(
                                    Math.cos(tipAngle1 + forkAngle) * tipDist,
                                    Math.sin(tipAngle1 + forkAngle) * tipDist,
                                    0.018
                                );
                                snowflakePositions.push(
                                    Math.cos(tipAngle3 + forkAngle) * tipDist,
                                    Math.sin(tipAngle3 + forkAngle) * tipDist,
                                    0.018
                                );
                            }
                        }
                    }

                    // 主枝上的横向冰晶连接（六边形框架）
                    if (i >= 10 && i <= 40 && i % 5 === 0) {
                        const hexDist = dist * 0.18;
                        for (let h = 0; h < 6; h++) {
                            const hexAngle = (h / 6) * Math.PI * 2 + armAngle;
                            snowflakePositions.push(
                                Math.cos(hexAngle) * hexDist,
                                Math.sin(hexAngle) * hexDist,
                                0.02
                            );
                        }
                        // 六边形顶点装饰
                        for (let h = 0; h < 6; h++) {
                            const hexAngle = (h / 6) * Math.PI * 2 + armAngle + Math.PI / 6;
                            const decDist = hexDist * 1.15;
                            snowflakePositions.push(
                                Math.cos(hexAngle) * decDist,
                                Math.sin(hexAngle) * decDist,
                                0.023
                            );
                        }
                    }
                }

                // 末端三叉冰晶（更复杂）
                const tipDist = 0.26;
                for (let t = 0; t < 3; t++) {
                    const spread = 0.2 - t * 0.05;
                    const tipAngle = armAngle + (t - 1) * spread;
                    const tipRadius = tipDist + t * 0.015;

                    // 三叉主干
                    snowflakePositions.push(
                        Math.cos(tipAngle) * tipRadius,
                        Math.sin(tipAngle) * tipRadius,
                        0.025
                    );
                    // 两侧分支
                    snowflakePositions.push(
                        Math.cos(tipAngle + 0.1) * tipRadius * 0.7,
                        Math.sin(tipAngle + 0.1) * tipRadius * 0.7,
                        0.02
                    );
                    snowflakePositions.push(
                        Math.cos(tipAngle - 0.1) * tipRadius * 0.7,
                        Math.sin(tipAngle - 0.1) * tipRadius * 0.7,
                        0.02
                    );
                }
            }

            // 中心六边形冰晶核心（3 层旋转）
            for (let ring = 0; ring < 3; ring++) {
                const ringRadius = 0.03 + ring * 0.025;
                const rotation = ring * Math.PI / 6;
                for (let i = 0; i < 6; i++) {
                    const angle = (i / 6) * Math.PI * 2 + rotation;
                    snowflakePositions.push(
                        Math.cos(angle) * ringRadius,
                        Math.sin(angle) * ringRadius,
                        0.03 - ring * 0.005
                    );
                }
            }

            // 中心亮点
            snowflakePositions.push(0, 0, 0.035);
            snowflakePositions.push(0, 0, 0.02);

            // 中间六边形框架
            for (let i = 0; i < 6; i++) {
                const angle = (i / 6) * Math.PI * 2;
                const hexRadius = 0.14;
                snowflakePositions.push(
                    Math.cos(angle) * hexRadius,
                    Math.sin(angle) * hexRadius,
                    0.025
                );

                // 六边形边上的冰晶装饰
                const edgeAngle1 = angle + Math.PI / 12;
                const edgeAngle2 = angle - Math.PI / 12;
                const edgeDist = hexRadius * 0.92;
                snowflakePositions.push(
                    Math.cos(edgeAngle1) * edgeDist,
                    Math.sin(edgeAngle1) * edgeDist,
                    0.023
                );
                snowflakePositions.push(
                    Math.cos(edgeAngle2) * edgeDist,
                    Math.sin(edgeAngle2) * edgeDist,
                    0.023
                );

                // 六边形外冰晶簇
                const clusterAngle = angle;
                const clusterDist = hexRadius * 1.15;
                for (let c = 0; c < 3; c++) {
                    const cAngle = clusterAngle + (c - 1) * Math.PI / 16;
                    snowflakePositions.push(
                        Math.cos(cAngle) * clusterDist * (1 - c * 0.15),
                        Math.sin(cAngle) * clusterDist * (1 - c * 0.15),
                        0.02
                    );
                }
            }

            const snowflakeGeometry = new THREE.BufferGeometry();
            snowflakeGeometry.setAttribute('position', new THREE.Float32BufferAttribute(snowflakePositions, 3));
            const snowflake = new THREE.Points(snowflakeGeometry, snowflakeMaterial);
            frameGroup.add(snowflake);

            // 添加一个点击检测平面（透明但可检测）
            const hitGeometry = new THREE.PlaneGeometry(0.5, 0.5);
            const hitMaterial = new THREE.MeshBasicMaterial({
                transparent: true,
                opacity: 0,
                depthTest: false,
                depthWrite: false,
                color: 0xffffff,
                side: THREE.DoubleSide
            });
            const hitMesh = new THREE.Mesh(hitGeometry, hitMaterial);
            hitMesh.rotation.y = Math.PI;
            hitMesh.position.z = 0.1;
            hitMesh.renderOrder = 1;
            frameGroup.add(hitMesh);

            frameGroup.userData.photo = photo;
            frameGroup.userData.snowflake = snowflake;
            frameGroup.userData.hitMesh = hitMesh;
            frameGroup.userData.showingPhoto = false;

            frameGroup.position.set(x, y, z);
            frameGroup.rotation.y = rotY;
            frameGroup.scale.setScalar(scale);

            scene.add(frameGroup);
            photoFrames.push(frameGroup);

            return frameGroup;
        }

        // 在树周围添加多个小相框
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const radius = 3.5;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = 0.5 + (i % 4) * 1.2;

                const radius = 3 + r * 1.5;
                for (let i = 0; i < pointsPerRing; i++) {
                    const angle = (i / pointsPerRing) * Math.PI * 2;
                    ringPositions.push(
                        Math.cos(angle) * radius,
                        -1,
                        Math.sin(angle) * radius

                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(ringPositions, 3));
            const ringMaterial = new THREE.PointsMaterial({
                color: 0xffd700,
                size: 0.05,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending
            });
            const groundRing = new THREE.Points(geometry, ringMaterial);
            scene.add(groundRing);

        // 动画
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            // 光点闪烁效果
            particleGroups.forEach(group => {
                if (group.mesh && group.mesh.material) {
                    const flicker = Math.sin(time * 3 + group.mesh.id) * 0.15 + 0.85;
                    group.mesh.material.opacity = flicker;
                }

                if (group.light) {
                    group.light.intensity = 2.5 + Math.sin(time * 2) * 1;
                }

                // 浮动效果
                if (group.type === 'floating' && group.mesh) {
                    group.mesh.rotation.y = time * 0.1;
                    const positions = group.mesh.geometry.attributes.position.array;
                    for (let i = 0; i < positions.length / 3; i++) {
                        positions[i * 3 + 1] += Math.sin(time * 2 + i) * 0.005;
                    }
                    group.mesh.geometry.attributes.position.needsUpdate = true;
                }

                // 相框轻微浮动
                if (group.type === 'frame' && group.mesh) {
                    group.mesh.position.y += Math.sin(time * 2 + group.mesh.id) * 0.002;
                }
            });

            // 相框动画
            photoFrames.forEach((frame, index) => {
                frame.rotation.y += 0.005;
                frame.position.y += Math.sin(time * 2 + index) * 0.002;

                // hitMesh 始终面向相机
                const hitMesh = frame.userData.hitMesh;
                if (hitMesh) {
                    hitMesh.lookAt(camera.position);
                }

                // 雪花旋转（当照片未显示时）
                const snowflake = frame.userData.snowflake;
                if (snowflake && !frame.userData.showingPhoto) {
                    snowflake.rotation.z = time * 0.3 + index * 0.5;
                }
            });

            // 雪花粒子
            if (!scene.userData.snow) {
                const snowGeometry = new THREE.BufferGeometry();
                const snowCount = 300;
                const snowPositions = new Float32Array(snowCount * 3);

                for (let i = 0; i < snowCount; i++) {
                    snowPositions[i * 3] = (Math.random() - 0.5) * 40;
                    snowPositions[i * 3 + 1] = Math.random() * 25;
                    snowPositions[i * 3 + 2] = (Math.random() - 0.5) * 40;
                }

                snowGeometry.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));

                const snowMaterial = new THREE.PointsMaterial({
                    color: 0xadd8e6,
                    size: 0.08,
                    map: circleTexture,
                    transparent: true,
                    opacity: 0.4,
                    blending: THREE.AdditiveBlending,
                    depthWrite: false
                });

                scene.userData.snow = new THREE.Points(snowGeometry, snowMaterial);
                scene.add(scene.userData.snow);
            }

            const snowPositions = scene.userData.snow.geometry.attributes.position.array;
            for (let i = 0; i < snowPositions.length / 3; i++) {
                snowPositions[i * 3 + 1] -= 0.03;
                if (snowPositions[i * 3 + 1] < 0) {
                    snowPositions[i * 3 + 1] = 25;
                }
            }
            scene.userData.snow.geometry.attributes.position.needsUpdate = true;

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
