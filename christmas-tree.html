<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>光效圣诞树</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            overflow: hidden;
            background: #000;
        }
        canvas {
            display: block;
        }
        #info {
            position: absolute;
            top: 10px;
            left: 50%;
            transform: translateX(-50%);
            color: white;
            font-family: Arial, sans-serif;
            text-align: center;
            text-shadow: 0 0 10px rgba(255, 215, 0, 0.8);
            pointer-events: none;
            z-index: 100;
        }
        h1 {
            font-size: 2em;
            margin-bottom: 5px;
        }
        p {
            font-size: 0.9em;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div id="info">
        <h1>✨ 光效圣诞树 ✨</h1>
        <p>拖动鼠标旋转视角 | 滚轮缩放 | 点击礼物盒</p>
    </div>

    <script type="importmap">
    {
        "imports": {
            "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
            "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
        }
    }
    </script>

    <script type="module">
        import * as THREE from 'three';
        import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

        // 场景设置
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a1a);

        // 添加雾效
        scene.fog = new THREE.FogExp2(0x0a0a1a, 0.02);

        // 相机设置
        const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
        camera.position.set(0, 5, 12);

        // 渲染器
        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        document.body.appendChild(renderer.domElement);

        // 轨道控制器
        const controls = new OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.minDistance = 5;
        controls.maxDistance = 30;
        controls.maxPolarAngle = Math.PI / 2 + 0.3;

        // 加载照片纹理
        const textureLoader = new THREE.TextureLoader();
        const photoTexture = textureLoader.load('1.png');
        photoTexture.colorSpace = THREE.SRGBColorSpace;

        // 光效圣诞树组
        const lightTreeGroup = new THREE.Group();
        scene.add(lightTreeGroup);

        // 金黄色光点材质
        const goldenLightMaterial = new THREE.PointsMaterial({
            color: 0xffd700,
            size: 0.15,
            transparent: true,
            opacity: 0.9,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true
        });

        const warmGoldenMaterial = new THREE.PointsMaterial({
            color: 0xffaa00,
            size: 0.12,
            transparent: true,
            opacity: 0.8,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true
        });

        const brightGoldenMaterial = new THREE.PointsMaterial({
            color: 0xffee88,
            size: 0.2,
            transparent: true,
            opacity: 1,
            blending: THREE.AdditiveBlending,
            depthWrite: false,
            sizeAttenuation: true
        });

        // 存储所有光点用于动画
        const treeParticles = [];
        const particleGroups = [];

        // 创建螺旋光带
        function createSpiralLightStrip(startY, endY, startRadius, endRadius, turns, density) {
            const points = [];
            const totalPoints = density;

            for (let i = 0; i < totalPoints; i++) {
                const t = i / totalPoints;
                const angle = t * turns * Math.PI * 2;
                const y = startY + t * (endY - startY);
                const radius = startRadius + t * (endRadius - startRadius);

                // 主螺旋
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                points.push(new THREE.Vector3(x, y, z));

                // 添加反向螺旋增加密度
                const angle2 = -angle + Math.PI;
                const x2 = Math.cos(angle2) * radius * 0.9;
                const z2 = Math.sin(angle2) * radius * 0.9;
                points.push(new THREE.Vector3(x2, y, z2));
            }

            return points;
        }

        // 创建圆形光环
        function createLightRing(y, radius, density, material) {
            const geometry = new THREE.BufferGeometry();
            const positions = [];

            for (let i = 0; i < density; i++) {
                const angle = (i / density) * Math.PI * 2;
                const x = Math.cos(angle) * radius;
                const z = Math.sin(angle) * radius;
                positions.push(x, y, z);
            }

            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));
            const particles = new THREE.Points(geometry, material);
            lightTreeGroup.add(particles);
            particleGroups.push({ mesh: particles, baseY: y, type: 'ring' });

            return positions.length / 3;
        }

        // 创建树干光点（垂直线条）
        function createTrunkLights() {
            const trunkPositions = [];
            const trunkLines = 8;
            const segmentsPerLine = 20;

            for (let line = 0; line < trunkLines; line++) {
                const angle = (line / trunkLines) * Math.PI * 2;
                for (let seg = 0; seg < segmentsPerLine; seg++) {
                    const t = seg / segmentsPerLine;
                    const x = Math.cos(angle) * 0.4;
                    const z = Math.sin(angle) * 0.4;
                    const y = t * 1.5;
                    trunkPositions.push(x, y, z);
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(trunkPositions, 3));
            const trunkParticles = new THREE.Points(geometry, goldenLightMaterial);
            lightTreeGroup.add(trunkParticles);
            particleGroups.push({ mesh: trunkParticles, type: 'trunk' });

            return trunkPositions.length / 3;
        }

        // 创建树层光点（螺旋光带）
        function createTreeLayerLights(bottomY, topY, bottomRadius, topRadius, layerIndex) {
            const height = topY - bottomY;
            const turns = 3;
            const density = 150;

            const positions = [];
            for (let i = 0; i < density; i++) {
                const t = i / density;
                const angle = t * turns * Math.PI * 2 + (layerIndex * Math.PI / 2);
                const y = bottomY + t * height;
                const radius = bottomRadius + t * (topRadius - bottomRadius);

                // 主螺旋
                let x = Math.cos(angle) * radius;
                let z = Math.sin(angle) * radius;
                positions.push(x, y, z);

                // 第二层螺旋（偏移）
                const angle2 = angle + Math.PI;
                const radius2 = radius * 0.85;
                x = Math.cos(angle2) * radius2;
                z = Math.sin(angle2) * radius2;
                positions.push(x, y, z);

                // 随机点缀光点
                if (i % 5 === 0) {
                    const randAngle = Math.random() * Math.PI * 2;
                    const randRadius = radius * (0.3 + Math.random() * 0.4);
                    x = Math.cos(randAngle) * randRadius;
                    z = Math.sin(randAngle) * randRadius;
                    positions.push(x, y + (Math.random() - 0.5) * 0.3, z);
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(positions, 3));

            // 交替使用不同材质
            const material = layerIndex % 2 === 0 ? goldenLightMaterial : warmGoldenMaterial;
            const layerParticles = new THREE.Points(geometry, material);
            lightTreeGroup.add(layerParticles);
            particleGroups.push({ mesh: layerParticles, baseY: bottomY, type: 'layer' });

            return positions.length / 3;
        }

        // 创建轮廓光边（树边缘的亮线）
        function createOutlineLights() {
            const outlinePositions = [];
            const layers = [
                { y: 2.5, r: 2.5 },
                { y: 4.2, r: 2.0 },
                { y: 5.7, r: 1.5 },
                { y: 7.0, r: 1.0 }
            ];

            layers.forEach((layer, idx) => {
                // 每层底部轮廓
                for (let i = 0; i < 32; i++) {
                    const angle = (i / 32) * Math.PI * 2;
                    const x = Math.cos(angle) * layer.r;
                    const z = Math.sin(angle) * layer.r;
                    outlinePositions.push(x, layer.y - 0.3, z);
                }
            });

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(outlinePositions, 3));
            const outlineParticles = new THREE.Points(geometry, brightGoldenMaterial);
            lightTreeGroup.add(outlineParticles);
            particleGroups.push({ mesh: outlineParticles, type: 'outline' });

            return outlinePositions.length / 3;
        }

        // 创建顶部星星（由光点组成）
        function createStarLights() {
            const starPositions = [];
            const starY = 8.5;

            // 五角星顶点
            const outerRadius = 0.5;
            const innerRadius = 0.25;
            const points = 5;

            // 创建多层星星轮廓
            for (let layer = 0; layer < 3; layer++) {
                const layerScale = 1 - layer * 0.2;
                const layerY = starY + layer * 0.1;

                for (let i = 0; i < points * 2; i++) {
                    const radius = i % 2 === 0 ? outerRadius : innerRadius;
                    const angle = (i * Math.PI) / points - Math.PI / 2;
                    const x = Math.cos(angle) * radius * layerScale;
                    const z = Math.sin(angle) * radius * layerScale;
                    starPositions.push(x, layerY, z);

                    // 每个点周围添加光晕
                    for (let j = 0; j < 3; j++) {
                        const haloAngle = Math.random() * Math.PI * 2;
                        const haloRadius = 0.05 + Math.random() * 0.1;
                        starPositions.push(
                            x + Math.cos(haloAngle) * haloRadius,
                            layerY + (Math.random() - 0.5) * 0.1,
                            z + Math.sin(haloAngle) * haloRadius
                        );
                    }
                }
            }

            // 中心亮点
            for (let i = 0; i < 20; i++) {
                starPositions.push(
                    (Math.random() - 0.5) * 0.2,
                    starY + (Math.random() - 0.5) * 0.3,
                    (Math.random() - 0.5) * 0.2
                );
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(starPositions, 3));
            const starParticles = new THREE.Points(geometry, brightGoldenMaterial);
            lightTreeGroup.add(starParticles);
            particleGroups.push({ mesh: starParticles, type: 'star' });

            // 星星点光源
            const starLight = new THREE.PointLight(0xffd700, 3, 15);
            starLight.position.set(0, starY, 0);
            scene.add(starLight);
            particleGroups.push({ light: starLight, type: 'starLight' });

            return starPositions.length / 3;
        }

        // 创建飘浮光粒子
        function createFloatingLights() {
            const floatPositions = [];
            const floatCount = 200;

            for (let i = 0; i < floatCount; i++) {
                const angle = Math.random() * Math.PI * 2;
                const radius = 3 + Math.random() * 5;
                const y = 1 + Math.random() * 8;
                floatPositions.push(
                    Math.cos(angle) * radius,
                    y,
                    Math.sin(angle) * radius
                );
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(floatPositions, 3));
            const floatMaterial = new THREE.PointsMaterial({
                color: 0xffaa00,
                size: 0.08,
                transparent: true,
                opacity: 0.6,
                blending: THREE.AdditiveBlending
            });
            const floatParticles = new THREE.Points(geometry, floatMaterial);
            scene.add(floatParticles);
            particleGroups.push({ mesh: floatParticles, type: 'floating' });
        }

        // 创建光效相框（围绕树）
        const photoFrames = [];

        function createLightPhotoFrame(x, y, z, rotY, scale = 1) {
            const frameGroup = new THREE.Group();

            // 照片
            const photoGeometry = new THREE.PlaneGeometry(0.5, 0.65);
            const photoMaterial = new THREE.MeshStandardMaterial({
                map: photoTexture,
                side: THREE.DoubleSide,
                transparent: true,
                opacity: 0.95
            });
            const photo = new THREE.Mesh(photoGeometry, photoMaterial);
            frameGroup.add(photo);

            // 发光相框边框（由小光点组成）
            const borderPointsMaterial = new THREE.PointsMaterial({
                color: 0xffd700,
                size: 0.08,
                transparent: true,
                opacity: 1,
                blending: THREE.AdditiveBlending
            });

            const borderPositions = [];
            const borderDensity = 40;

            // 矩形边框
            for (let i = 0; i < borderDensity; i++) {
                const t = i / borderDensity;
                let bx, by;
                if (t < 0.25) {
                    bx = -0.275 + t * 4 * 0.55;
                    by = -0.35;
                } else if (t < 0.5) {
                    bx = 0.275;
                    by = -0.35 + (t - 0.25) * 4 * 0.7;
                } else if (t < 0.75) {
                    bx = 0.275 - (t - 0.5) * 4 * 0.55;
                    by = 0.35;
                } else {
                    bx = -0.275;
                    by = 0.35 - (t - 0.75) * 4 * 0.7;
                }
                borderPositions.push(bx, by, 0.02);
            }

            const borderGeometry = new THREE.BufferGeometry();
            borderGeometry.setAttribute('position', new THREE.Float32BufferAttribute(borderPositions, 3));
            const borderPoints = new THREE.Points(borderGeometry, borderPointsMaterial);
            frameGroup.add(borderPoints);

            // 四角亮点
            const cornerMaterial = new THREE.PointsMaterial({
                color: 0xffee88,
                size: 0.15,
                transparent: true,
                opacity: 1,
                blending: THREE.AdditiveBlending
            });
            const corners = [-0.25, -0.3, 0.25, -0.3, 0.25, 0.3, -0.25, 0.3];
            const cornerPositions = [];
            for (let i = 0; i < 4; i++) {
                cornerPositions.push(corners[i * 2], corners[i * 2 + 1], 0.03);
            }
            const cornerGeometry = new THREE.BufferGeometry();
            cornerGeometry.setAttribute('position', new THREE.Float32BufferAttribute(cornerPositions, 3));
            const cornerPoints = new THREE.Points(cornerGeometry, cornerMaterial);
            frameGroup.add(cornerPoints);

            frameGroup.position.set(x, y, z);
            frameGroup.rotation.y = rotY;
            frameGroup.scale.setScalar(scale);

            scene.add(frameGroup);
            photoFrames.push(frameGroup);

            return frameGroup;
        }

        // 在树周围添加多个小相框
        for (let i = 0; i < 8; i++) {
            const angle = (i / 8) * Math.PI * 2;
            const radius = 3.5;
            const x = Math.cos(angle) * radius;
            const z = Math.sin(angle) * radius;
            const y = 1 + (i % 4) * 1.5;
            createLightPhotoFrame(x, y, z, -angle + Math.PI, 0.8 + Math.random() * 0.2);
        }

        // 创建地面光环
        function createGroundRing() {
            const ringPositions = [];
            const rings = 3;
            const pointsPerRing = 100;

            for (let r = 0; r < rings; r++) {
                const radius = 3 + r * 1.5;
                for (let i = 0; i < pointsPerRing; i++) {
                    const angle = (i / pointsPerRing) * Math.PI * 2;
                    ringPositions.push(
                        Math.cos(angle) * radius,
                        0,
                        Math.sin(angle) * radius
                    );
                }
            }

            const geometry = new THREE.BufferGeometry();
            geometry.setAttribute('position', new THREE.Float32BufferAttribute(ringPositions, 3));
            const ringMaterial = new THREE.PointsMaterial({
                color: 0xffd700,
                size: 0.12,
                transparent: true,
                opacity: 0.7,
                blending: THREE.AdditiveBlending
            });
            const groundRing = new THREE.Points(geometry, ringMaterial);
            scene.add(groundRing);
            particleGroups.push({ mesh: groundRing, type: 'ground' });
        }

        // 构建光效树
        let totalParticles = 0;
        totalParticles += createTrunkLights();
        totalParticles += createTreeLayerLights(0.3, 2.5, 0.3, 2.5, 0);
        totalParticles += createTreeLayerLights(2.5, 4.2, 2.0, 1.5, 1);
        totalParticles += createTreeLayerLights(4.2, 5.7, 1.5, 1.0, 2);
        totalParticles += createTreeLayerLights(5.7, 7.0, 1.0, 0.5, 3);
        totalParticles += createOutlineLights();
        totalParticles += createStarLights();
        createFloatingLights();
        createGroundRing();

        console.log(`光效圣诞树创建成功！总光点数：${totalParticles}`);

        // 灯光
        const ambientLight = new THREE.AmbientLight(0x333355, 0.5);
        scene.add(ambientLight);

        const pointLight1 = new THREE.PointLight(0xffd700, 2, 20);
        pointLight1.position.set(5, 5, 5);
        scene.add(pointLight1);

        const pointLight2 = new THREE.PointLight(0xffaa00, 2, 20);
        pointLight2.position.set(-5, 3, -5);
        scene.add(pointLight2);

        // 礼物盒
        const gifts = [];
        const explosions = [];

        function createGift(x, z, color, ribbonColor) {
            const group = new THREE.Group();

            const boxGeometry = new THREE.BoxGeometry(0.8, 0.6, 0.8);
            const boxMaterial = new THREE.MeshStandardMaterial({
                color: color,
                metalness: 0.3,
                roughness: 0.5
            });
            const box = new THREE.Mesh(boxGeometry, boxMaterial);
            box.castShadow = true;
            group.add(box);

            const ribbonH = new THREE.Mesh(
                new THREE.BoxGeometry(0.82, 0.1, 0.15),
                new THREE.MeshStandardMaterial({ color: ribbonColor })
            );
            group.add(ribbonH);

            const ribbonV = new THREE.Mesh(
                new THREE.BoxGeometry(0.15, 0.1, 0.82),
                new THREE.MeshStandardMaterial({ color: ribbonColor })
            );
            group.add(ribbonV);

            group.position.set(x, 0.3, z);
            group.rotation.y = Math.random() * Math.PI;
            group.userData.color = color;
            group.userData.exploded = false;

            return group;
        }

        const gift1 = createGift(-1.5, 1.5, 0xff6b6b, 0xffd700);
        const gift2 = createGift(1.8, 1.2, 0x4ecdc4, 0xffffff);
        const gift3 = createGift(-1.2, -1.8, 0xffe66d, 0xff6b6b);
        const gift4 = createGift(1.5, -1.5, 0x95e1d3, 0xffd700);

        gifts.push(gift1, gift2, gift3, gift4);
        gifts.forEach(gift => scene.add(gift));

        // 创建爆炸粒子效果
        function createExplosion(position, color) {
            const particleCount = 50;
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(particleCount * 3);
            const velocities = [];
            const colors = new Float32Array(particleCount * 3);

            const colorObj = new THREE.Color(color);

            for (let i = 0; i < particleCount; i++) {
                positions[i * 3] = position.x;
                positions[i * 3 + 1] = position.y;
                positions[i * 3 + 2] = position.z;

                velocities.push({
                    x: (Math.random() - 0.5) * 0.3,
                    y: Math.random() * 0.2 + 0.1,
                    z: (Math.random() - 0.5) * 0.3
                });

                const variation = Math.random() * 0.3;
                colors[i * 3] = Math.min(1, colorObj.r + variation);
                colors[i * 3 + 1] = Math.min(1, colorObj.g + variation);
                colors[i * 3 + 2] = Math.min(1, colorObj.b + variation);
            }

            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));

            const material = new THREE.PointsMaterial({
                size: 0.15,
                vertexColors: true,
                transparent: true,
                opacity: 1
            });

            const particles = new THREE.Points(geometry, material);
            particles.userData.velocities = velocities;
            particles.userData.life = 1.0;

            scene.add(particles);
            explosions.push(particles);

            return particles;
        }

        // 鼠标点击检测
        const raycaster = new THREE.Raycaster();
        const mouse = new THREE.Vector2();

        // 照片弹窗
        const photoContainer = document.createElement('div');
        photoContainer.id = 'photo-popup';
        photoContainer.style.cssText = `
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) scale(0);
            z-index: 1000;
            background: linear-gradient(135deg, #1a1a2e, #16213e);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 0 50px rgba(255, 215, 0, 0.5);
            transition: transform 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 2px solid #ffd700;
        `;
        document.body.appendChild(photoContainer);

        const photoImg = document.createElement('img');
        photoImg.src = '1.png';
        photoImg.style.cssText = `
            max-width: 300px;
            max-height: 300px;
            display: block;
            border-radius: 8px;
            border: 2px solid #ffd700;
        `;
        photoImg.onerror = function() {
            this.src = 'data:image/svg+xml,' + encodeURIComponent('<svg xmlns="http://www.w3.org/2000/svg" width="300" height="200"><rect fill="#1a1a2e" width="300" height="200"/><text x="50%" y="50%" text-anchor="middle" dy=".3em" fill="#ffd700" font-family="Arial">照片加载失败</text></svg>');
        };
        photoContainer.appendChild(photoImg);

        const closeBtn = document.createElement('div');
        closeBtn.innerHTML = '×';
        closeBtn.style.cssText = `
            position: absolute;
            top: -15px;
            right: -15px;
            width: 35px;
            height: 35px;
            background: linear-gradient(135deg, #ffd700, #ffaa00);
            color: #000;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            font-size: 22px;
            font-weight: bold;
            box-shadow: 0 2px 15px rgba(255, 215, 0, 0.5);
        `;
        closeBtn.onclick = () => {
            photoContainer.style.transform = 'translate(-50%, -50%) scale(0)';
        };
        photoContainer.appendChild(closeBtn);

        function showPhoto() {
            photoContainer.style.transform = 'translate(-50%, -50%) scale(1)';
        }

        function onMouseClick(event) {
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1;

            raycaster.setFromCamera(mouse, camera);

            gifts.forEach(gift => {
                if (gift.userData.exploded) return;

                const intersects = raycaster.intersectObjects(gift.children, true);

                if (intersects.length > 0) {
                    gift.userData.exploded = true;
                    createExplosion(gift.position.clone(), gift.userData.color);
                    gift.visible = false;

                    setTimeout(() => {
                        showPhoto();
                    }, 500);

                    setTimeout(() => {
                        gift.visible = true;
                        gift.userData.exploded = false;
                    }, 3000);
                }
            });
        }

        window.addEventListener('click', onMouseClick);

        // 动画
        const clock = new THREE.Clock();

        function animate() {
            requestAnimationFrame(animate);

            const time = clock.getElapsedTime();

            // 光点闪烁效果
            particleGroups.forEach(group => {
                if (group.mesh && group.mesh.material) {
                    const baseOpacity = group.type === 'star' ? 1 : 0.8;
                    const flicker = Math.sin(time * 3 + group.mesh.id) * 0.2 + 0.8;
                    group.mesh.material.opacity = baseOpacity * flicker;
                }

                if (group.light) {
                    group.light.intensity = 2.5 + Math.sin(time * 2) * 1;
                }

                // 浮动效果
                if (group.type === 'floating' && group.mesh) {
                    group.mesh.rotation.y = time * 0.1;
                    const positions = group.mesh.geometry.attributes.position.array;
                    for (let i = 0; i < positions.length / 3; i++) {
                        positions[i * 3 + 1] += Math.sin(time * 2 + i) * 0.005;
                    }
                    group.mesh.geometry.attributes.position.needsUpdate = true;
                }

                // 相框轻微浮动
                if (group.type === 'frame' && group.mesh) {
                    group.mesh.position.y += Math.sin(time * 2 + group.mesh.id) * 0.002;
                }
            });

            // 相框动画
            photoFrames.forEach((frame, index) => {
                frame.rotation.y += 0.005;
                frame.position.y += Math.sin(time * 2 + index) * 0.002;
            });

            // 雪花粒子
            if (!scene.userData.snow) {
                const snowGeometry = new THREE.BufferGeometry();
                const snowCount = 300;
                const snowPositions = new Float32Array(snowCount * 3);

                for (let i = 0; i < snowCount; i++) {
                    snowPositions[i * 3] = (Math.random() - 0.5) * 40;
                    snowPositions[i * 3 + 1] = Math.random() * 25;
                    snowPositions[i * 3 + 2] = (Math.random() - 0.5) * 40;
                }

                snowGeometry.setAttribute('position', new THREE.BufferAttribute(snowPositions, 3));

                const snowMaterial = new THREE.PointsMaterial({
                    color: 0xffffff,
                    size: 0.1,
                    transparent: true,
                    opacity: 0.6
                });

                scene.userData.snow = new THREE.Points(snowGeometry, snowMaterial);
                scene.add(scene.userData.snow);
            }

            const snowPositions = scene.userData.snow.geometry.attributes.position.array;
            for (let i = 0; i < snowPositions.length / 3; i++) {
                snowPositions[i * 3 + 1] -= 0.03;
                if (snowPositions[i * 3 + 1] < 0) {
                    snowPositions[i * 3 + 1] = 25;
                }
            }
            scene.userData.snow.geometry.attributes.position.needsUpdate = true;

            // 爆炸粒子动画
            for (let i = explosions.length - 1; i >= 0; i--) {
                const explosion = explosions[i];
                const pos = explosion.geometry.attributes.position.array;
                const velocities = explosion.userData.velocities;

                for (let j = 0; j < velocities.length; j++) {
                    pos[j * 3] += velocities[j].x;
                    pos[j * 3 + 1] += velocities[j].y;
                    pos[j * 3 + 2] += velocities[j].z;
                    velocities[j].y -= 0.008;
                }

                explosion.geometry.attributes.position.needsUpdate = true;
                explosion.userData.life -= 0.02;
                explosion.material.opacity = explosion.userData.life;

                if (explosion.userData.life <= 0) {
                    scene.remove(explosion);
                    explosions.splice(i, 1);
                }
            }

            controls.update();
            renderer.render(scene, camera);
        }

        animate();

        // 窗口大小调整
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });
    </script>
</body>
</html>
